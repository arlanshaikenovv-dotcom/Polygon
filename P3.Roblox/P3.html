<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="P3.css">
</head>

<body>
    <!--Card 1-->
    <div class="Hero-Section">
        <div class="Roblox-Player-Picture">
            <img src="B.png" alt="Roblox-Player" width="185.36px" height="185.36px">
        </div>
        <div class="Place-Description">
            <div class="Greeting">
                Hello, PlayerOne!
            </div>
            <div class="Brookhaven-Add">
                Ready for your next adventure? Your friends are currently exploring
                Brookhaven and Blox Fruits. Jump back in!
            </div>
            <div class="Place-Online">
                <div class="Button-Border">
                    <img src="Container.png" alt="Comunity" width="24px" height="12px" class="ifo">
                    Friends Online
                </div>
                <div class="Button-Border"> <img src="Star.png" alt="Level-Of-The-Game" width="20px" height="20px"
                        class="ifo">
                    Level 42 Architect</div>
            </div>
        </div>

    </div>
    <!--Card 2-->
<div class="Block-Sides">
        <div class="Raining-City">
            <img src="Background.png" alt="Plave-Online" width="236px" height="144px" class="usmth">
            <div class="Place-Name">Blox Fruits</div>
            <div class="Percents">
                <img src="Like.png" alt="Like" width="12.25px" height="11.666666984558105px">
                96%
            </div>




        </div>



    <div class="Night-City">
        <img src="City.png" alt="Night-City" width="286px" height="286px" class="Image-Radius">
        <div class="Combined-Settings">City Life 2</div>
        <div class="Flex">
            <div class="flex-1">
                <img src="Like.png" alt="Like-City" width="10.5px" height="10px">
                98%
            </div>
            <div>
                4.2K Active
            </div>
        </div>
    </div>
</div>

    <!--Card 3-->
</body>
